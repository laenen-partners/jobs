version: "3"

tasks:
  setup:
    desc: Download and verify Go module dependencies
    cmds:
      - go mod download && go mod verify

  build:
    desc: Build all Go modules
    cmds:
      - go build ./...

  generate:
    desc: Run all code generation
    cmds:
      - task: generate:proto
      - task: generate:templ

  generate:templ:
    desc: Run templ generate
    dir: ui
    cmds:
      - go tool templ generate

  generate:proto:
    desc: Run proto generate
    dir: connectrpc
    cmds:
      - buf generate

  format:
    desc: Format all
    cmds:
      - task: format:go
      - task: format:templ
      - task: format:proto

  format:go:
    desc: Format Go code
    cmds:
      - gofumpt -l -w .

  format:proto:
    desc: Format proto files
    dir: connectrpc
    cmds:
      - buf format -w .

  format:templ:
    desc: Format templ files
    dir: ui
    cmds:
      - go tool templ fmt .

  lint:
    desc: Run linters
    cmds:
      - task: lint:go
      - task: lint:proto

  lint:go:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  lint:proto:
    desc: Run proto linter
    dir: connectrpc
    cmds:
      - buf lint .

  test:ci:
    desc: Run tests and output JUnit XML to reports/
    cmds:
      - mkdir -p reports
      - gotestsum --junitfile reports/junit.xml -- ./...

  vuln:ci:
    desc: Run osv-scanner vulnerability scan
    cmds:
      - osv-scanner scan -r .

  ci:
    desc: Run the full CI pipeline
    cmds:
      - task setup
      - task generate
      - task format
      - task lint
      - task build
      - task test:ci
      - task vuln:ci
